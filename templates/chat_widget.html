<div id="global-chat-widget">
    <button id="global-chat-toggle" aria-label="Ouvrir l'assistant IA">
        <i class="fas fa-comment-dots"></i>
    </button>
    <div id="global-chat-window" class="collapsed">
        <div class="global-chat-header">
            <h3><i class="fas fa-robot"></i> Assistant IA</h3>
            <button id="global-chat-close" aria-label="Fermer"><i class="fas fa-times"></i></button>
        </div>
        <div class="global-chat-body" id="global-chat-messages">
            <div class="global-message assistant">
                Bonjour ! Je peux vous aider sur l'ACP, l'AFD, l'AFC, les donnees a charger et l'interpretation des resultats.
            </div>
        </div>
        <div class="global-chat-footer">
            <input type="text" id="global-chat-input" placeholder="Posez une question..." autocomplete="off">
            <button id="global-chat-send" aria-label="Envoyer"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<style>
    #global-chat-widget {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 1100;
        font-family: 'Inter', sans-serif;
    }

    #global-chat-toggle {
        width: 60px;
        height: 60px;
        border: none;
        border-radius: 50%;
        color: #fff;
        background: linear-gradient(135deg, var(--accent-color, #6366f1), var(--neon-cyan, #22d3ee));
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.38);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.45rem;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #global-chat-toggle:hover {
        transform: translateY(-3px) scale(1.06);
        box-shadow: 0 14px 34px rgba(34, 211, 238, 0.28);
    }

    #global-chat-window {
        position: absolute;
        right: 0;
        bottom: 80px;
        width: min(360px, calc(100vw - 2rem));
        height: 500px;
        background: rgba(15, 23, 42, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.9rem;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(14px);
        transition: opacity 0.28s ease, transform 0.28s ease;
    }

    #global-chat-window.collapsed {
        opacity: 0;
        transform: translateY(18px) scale(0.94);
        pointer-events: none;
    }

    .global-chat-header {
        padding: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0, 0, 0, 0.32);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .global-chat-header h3 {
        margin: 0;
        padding: 0;
        border: none;
        color: var(--neon-cyan, #22d3ee);
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    #global-chat-close,
    #global-chat-send {
        border: none;
        cursor: pointer;
    }

    #global-chat-close {
        color: rgba(255, 255, 255, 0.72);
        background: transparent;
        font-size: 1.1rem;
    }

    .global-chat-body {
        flex: 1;
        padding: 1rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
    }

    .global-message {
        max-width: 86%;
        padding: 0.78rem 0.95rem;
        border-radius: 0.85rem;
        line-height: 1.45;
        font-size: 0.92rem;
    }

    .global-message.assistant {
        align-self: flex-start;
        color: #f8fafc;
        background: rgba(99, 102, 241, 0.16);
        border: 1px solid rgba(129, 140, 248, 0.26);
        border-bottom-left-radius: 0.2rem;
    }

    .global-message.user {
        align-self: flex-end;
        color: #fff;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border-bottom-right-radius: 0.2rem;
    }

    .global-message.loading {
        align-self: flex-start;
        color: rgba(255, 255, 255, 0.62);
        font-style: italic;
    }

    .global-message p {
        margin: 0 0 0.5rem;
    }

    .global-message p:last-child {
        margin-bottom: 0;
    }

    .global-message strong {
        color: #a5b4fc;
    }

    .global-message code {
        background: rgba(0, 0, 0, 0.3);
        padding: 0.15rem 0.35rem;
        border-radius: 0.25rem;
    }

    .global-chat-footer {
        padding: 0.9rem;
        display: flex;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.24);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    #global-chat-input {
        flex: 1;
        min-width: 0;
        color: #fff;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 0.75rem 1rem;
        outline: none;
    }

    #global-chat-input:focus {
        border-color: var(--neon-cyan, #22d3ee);
    }

    #global-chat-send {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: #fff;
        background: var(--accent-color, #6366f1);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    @media (max-width: 768px) {
        #global-chat-widget {
            right: 1rem;
            bottom: 1rem;
        }

        #global-chat-window {
            position: fixed;
            left: 1rem;
            right: 1rem;
            bottom: 5.5rem;
            width: auto;
            height: min(480px, calc(100vh - 7rem));
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const context = window.ANALYSIS_CONTEXT || {};
        const toggle = document.getElementById('global-chat-toggle');
        const close = document.getElementById('global-chat-close');
        const win = document.getElementById('global-chat-window');
        const messages = document.getElementById('global-chat-messages');
        const input = document.getElementById('global-chat-input');
        const send = document.getElementById('global-chat-send');
        let history = [];

        function parseMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }

        function addMessage(content, role) {
            const node = document.createElement('div');
            node.className = `global-message ${role}`;
            if (role === 'assistant' && content !== '...') {
                node.innerHTML = `<p>${parseMarkdown(content)}</p>`;
            } else {
                node.textContent = content;
            }
            messages.appendChild(node);
            messages.scrollTop = messages.scrollHeight;
            return node;
        }

        function toggleChat() {
            win.classList.toggle('collapsed');
            if (!win.classList.contains('collapsed')) input.focus();
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            input.value = '';
            const loading = addMessage('...', 'loading');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        history,
                        analysisType: context.analysisType || 'general',
                        pageContext: context.pageContext || {},
                        interpretationData: context.interpretationData || {}
                    })
                });
                const data = await response.json();
                loading.remove();
                if (data.response) {
                    addMessage(data.response, 'assistant');
                    history.push({ role: 'user', content: message });
                    history.push({ role: 'assistant', content: data.response });
                } else {
                    addMessage(`Erreur: ${data.error || 'reponse vide'}`, 'assistant');
                }
            } catch (error) {
                loading.remove();
                addMessage(`Erreur de connexion: ${error.message}`, 'assistant');
            }
        }

        toggle.addEventListener('click', toggleChat);
        close.addEventListener('click', toggleChat);
        send.addEventListener('click', sendMessage);
        input.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') sendMessage();
        });
    });
</script>
